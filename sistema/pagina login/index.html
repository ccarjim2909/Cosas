<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Principal</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <script src="./assets/js/script.js" defer></script>
</head>

<body>

  <header class="cabecera">
    <h1 class="cabecera__titulo">Mi Pagina Web</h1>
    <button class="cabecera__boton-login">Iniciar sesion</button>

    <section class="login login--oculto">
      <form class="login__formulario">
        <input type="text" class="login__input login__input--usuario" placeholder="Usuario">
        <input type="password" class="login__input login__input--contraseña" placeholder="Contraseña">
        <button type="button" class="login__boton">Entrar</button>
        <p class="login__mensaje"></p>
      </form>
    </section>
  </header>

  <main class="principal">
    <section class="principal__seccion">
      <h2 class="principal__titulo">titulo de algo</h2>
      <p class="principal__texto">ese algo</p>
    </section>
  </main>

</body>
</html>
